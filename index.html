<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sammy’s Lifestyle check | Premium Clothing</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
    .serif { font-family: 'Playfair Display', serif; }
    .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); }
    .hidden-page { display: none !important; }
  </style>
</head>
<body class="bg-[#fafafa] text-zinc-900">

  <header id="main-nav" class="fixed top-0 w-full z-50 glass border-b border-zinc-100">
    <div class="max-w-7xl mx-auto flex justify-between items-center px-6 py-4">
      <h1 class="text-2xl font-bold tracking-tighter serif cursor-pointer" onclick="location.reload()">Sammy’s Lifestyle</h1>
      <nav class="hidden md:flex gap-8 text-xs font-bold uppercase tracking-[0.2em] text-zinc-400">
        <a href="#men" class="hover:text-black transition">Men</a>
        <a href="#women" class="hover:text-black transition">Women</a>
      </nav>
      <div class="flex items-center">
        <button onclick="toggleCart()" class="text-xs font-bold bg-black text-white px-6 py-2.5 rounded-full tracking-widest uppercase hover:opacity-80 transition">
          Bag (<span id="cart-count">0</span>)
        </button>
      </div>
    </div>
  </header>

  <main id="store-page">
    <section class="relative h-[60vh] flex items-center overflow-hidden pt-16">
      <div class="absolute inset-0 z-0">
        <img src="https://images.unsplash.com/photo-1441984904996-e0b6ba687e04?q=80&w=2070" class="w-full h-full object-cover brightness-90">
      </div>
      <div class="relative z-10 max-w-7xl mx-auto px-6 w-full text-white">
        <h2 class="text-5xl md:text-7xl font-bold mb-4 serif italic">Essential Apparel</h2>
        <p class="mb-8 text-lg opacity-90 font-light italic">Refined. Simple. Yours.</p>
      </div>
    </section>

    <section id="men" class="max-w-7xl mx-auto p-6 py-20">
      <h3 class="text-3xl serif mb-10 border-b pb-4">Men's Collection</h3>
      <div id="men-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-8"></div>
    </section>

    <section id="women" class="max-w-7xl mx-auto p-6 py-10">
      <h3 class="text-3xl serif mb-10 border-b pb-4">Women's Collection</h3>
      <div id="women-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-8"></div>
    </section>

    <footer id="main-footer" class="bg-white border-t border-zinc-100 pt-20 pb-10 mt-20">
      <div class="max-w-7xl mx-auto px-6 pt-8 border-t border-zinc-50 flex flex-col md:flex-row justify-between items-center gap-4 text-center">
        <p class="text-zinc-400 text-[10px] uppercase tracking-[0.2em]">© 2026 Sammy’s Lifestyle. All Rights Reserved.</p>
        <div class="flex gap-6 text-[10px] uppercase tracking-widest font-bold text-zinc-300">
          <a href="#" class="hover:text-black transition">Privacy</a>
          <a href="#" class="hover:text-black transition">Terms</a>
          <a href="#" class="hover:text-black transition">Instagram</a>
        </div>
      </div>
    </footer>
  </main>

  <section id="checkout-page" class="hidden-page fixed inset-0 z-[100] bg-white overflow-y-auto pt-24 pb-10">
    <div class="max-w-4xl mx-auto px-6">
      <button onclick="closeCheckout()" class="text-sm font-bold uppercase tracking-widest mb-8 text-zinc-400 hover:text-black transition">← Back to Shop</button>
      <div class="grid md:grid-cols-2 gap-12">
        <div class="space-y-8">
          <h2 class="text-3xl serif">Shipping & Payment</h2>
          <div class="space-y-4">
            <input type="text" id="cust-name" placeholder="Full Name" class="w-full border-b border-zinc-200 py-3 focus:outline-none focus:border-black">
            <input type="email" id="cust-email" placeholder="Email Address" class="w-full border-b border-zinc-200 py-3 focus:outline-none focus:border-black">
            <textarea id="cust-address" placeholder="Shipping Address" rows="3" class="w-full border-b border-zinc-200 py-3 focus:outline-none focus:border-black"></textarea>
          </div>
        </div>
        <div class="bg-zinc-50 p-8 rounded-2xl h-fit sticky top-24">
          <h3 class="font-bold mb-6 uppercase tracking-widest text-xs">Summary</h3>
          <div id="checkout-items-list" class="space-y-4 mb-6 text-sm"></div>
          <div class="border-t pt-4 flex justify-between text-xl font-bold"><span>Total</span><span id="final-total">₹0</span></div>
          <button onclick="placeOrder()" class="w-full bg-black text-white py-5 rounded-full mt-8 font-bold uppercase text-xs tracking-widest">Confirm Order</button>
        </div>
      </div>
    </div>
  </section>

  <section id="success-screen" class="hidden-page fixed inset-0 z-[200] bg-white flex flex-col items-center justify-center text-center p-6">
    <div class="w-24 h-24 bg-green-50 text-green-500 rounded-full flex items-center justify-center text-4xl mb-8">✓</div>
    <h2 class="text-4xl serif mb-4 italic">Thank You!</h2>
    <p class="text-zinc-400 max-w-sm mb-10">Your order has been received.</p>
    <button onclick="location.reload()" class="border border-black px-12 py-4 rounded-full font-bold uppercase text-xs tracking-widest hover:bg-black hover:text-white transition">Continue Shopping</button>
  </section>

  <div id="cartDrawer" class="fixed top-0 right-[-100%] w-full md:w-[400px] h-full bg-white z-[60] shadow-2xl transition-all duration-500 flex flex-col">
    <div class="p-8 border-b flex justify-between items-center">
      <h3 class="text-lg font-bold serif uppercase tracking-widest">Bag</h3>
      <button onclick="toggleCart()" class="text-3xl">&times;</button>
    </div>
    <div id="cart-items-div" class="flex-1 overflow-y-auto p-8 space-y-6"></div>
    <div class="p-8 border-t bg-zinc-50">
      <div class="flex justify-between mb-6 text-xl font-bold"><span>Total</span><span id="cart-total">₹0</span></div>
      <button onclick="openCheckout()" class="w-full bg-black text-white py-5 rounded-full font-bold uppercase text-xs tracking-widest">Checkout</button>
    </div>
  </div>

  <script>
    const inventory = [
      { id: 1, cat: 'men', name: "Linen Summer Shirt", price: 1999, img: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=500" },
      { id: 2, cat: 'men', name: "Navy Classic Blazer", price: 4999, img: "https://images.unsplash.com/photo-1507679799987-c73779587ccf?w=500" },
      { id: 3, cat: 'men', name: "Slim Fit Chinos", price: 2499, img: "https://images.unsplash.com/photo-1473966968600-fa801b869a1a?w=500" },
      { id: 4, cat: 'men', name: "Cotton Polo", price: 1499, img: "https://images.unsplash.com/photo-1581655353564-df123a1eb820?w=500" },
      { id: 5, cat: 'women', name: "Silk Wrap Dress", price: 3999, img: "https://images.unsplash.com/photo-1595777457583-95e059d581b8?w=500" },
      { id: 6, cat: 'women', name: "Wool Overcoat", price: 7999, img: "https://images.unsplash.com/photo-1539109136881-3be0616acf4b?w=500" },
      { id: 7, cat: 'women', name: "Linen Trousers", price: 2199, img: "https://images.unsplash.com/photo-1594633312681-425c7b97ccd1?w=500" },
      { id: 8, cat: 'women', name: "Basic White Tee", price: 999, img: "https://images.unsplash.com/photo-1554568218-0f1715e72254?w=500" }
    ];

    let cart = [];

    function init() {
      const mGrid = document.getElementById('men-grid');
      const wGrid = document.getElementById('women-grid');
      inventory.forEach(p => {
        const html = `
          <div class="group">
            <div class="relative overflow-hidden rounded-2xl mb-4 bg-zinc-100 aspect-[3/4]">
              <img src="${p.img}" class="w-full h-full object-cover group-hover:scale-105 transition duration-700">
              <button onclick="addToCart(${p.id})" class="absolute bottom-4 left-4 right-4 bg-white py-4 text-[10px] font-bold uppercase tracking-widest opacity-0 group-hover:opacity-100 transition shadow-xl hover:bg-black hover:text-white">Add To Bag +</button>
            </div>
            <h4 class="font-bold text-sm uppercase mb-1">${p.name}</h4>
            <p class="text-zinc-500 text-sm italic">₹${p.price.toLocaleString()}</p>
          </div>`;
        if(p.cat === 'men') mGrid.innerHTML += html;
        else wGrid.innerHTML += html;
      });
    }

    function addToCart(id) {
      const p = inventory.find(x => x.id === id);
      const ex = cart.find(x => x.id === id);
      if(ex) ex.quantity++;
      else cart.push({...p, quantity: 1});
      updateUI();
      document.getElementById('cartDrawer').style.right = '0px';
    }

    function updateUI() {
      const itemsDiv = document.getElementById('cart-items-div');
      let total = 0, count = 0;
      itemsDiv.innerHTML = cart.map((item, i) => {
        total += (item.price * item.quantity);
        count += item.quantity;
        return `<div class="flex gap-4 items-center pb-4 border-b">
          <img src="${item.img}" class="w-16 h-20 object-cover rounded">
          <div class="flex-1"><h5 class="font-bold text-[10px] uppercase">${item.name}</h5><p class="text-zinc-400 text-[10px]">₹${item.price.toLocaleString()} x ${item.quantity}</p></div>
          <button onclick="removeItem(${i})" class="text-zinc-300 hover:text-black">×</button>
        </div>`;
      }).join('');
      document.getElementById('cart-count').innerText = count;
      document.getElementById('cart-total').innerText = '₹' + total.toLocaleString();
      document.getElementById('final-total').innerText = '₹' + total.toLocaleString();
    }

    function removeItem(i) { cart.splice(i, 1); updateUI(); }
    function toggleCart() {
      const d = document.getElementById('cartDrawer');
      d.style.right = d.style.right === '0px' ? '-100%' : '0px';
    }
    function openCheckout() {
      if(cart.length === 0) return alert("Bag is empty!");
      toggleCart();
      document.getElementById('store-page').classList.add('hidden-page');
      document.getElementById('checkout-page').classList.remove('hidden-page');
    }
    function closeCheckout() {
      document.getElementById('checkout-page').classList.add('hidden-page');
      document.getElementById('store-page').classList.remove('hidden-page');
    }
    function placeOrder() {
      if(!document.getElementById('cust-name').value) return alert("Please fill details!");
      document.getElementById('checkout-page').classList.add('hidden-page');
      document.getElementById('success-screen').classList.remove('hidden-page');
    }

    init();

    // Password Reset Handler (Netlify Identity)
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>
</body>
</html>
