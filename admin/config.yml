backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "products"
    label: "Clothing Products"
    folder: "products"
    create: true
    extension: "json"
    format: "json"
    slug: "{{title}}"
    fields:
      - {label: "ID", name: "id", widget: "number"}
      - {label: "Category", name: "cat", widget: "select", options: ["men", "women"]}
      - {label: "Product Name", name: "title", widget: "string"}
      - {label: "Price", name: "price", widget: "number"}
      - {label: "Image URL", name: "img", widget: "image"}
